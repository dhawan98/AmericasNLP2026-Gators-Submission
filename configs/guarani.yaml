# Guaraní translation configuration
# Used with: python translate_mt.py train --config configs/guarani.yaml

language: guarani

# Model
model_name: facebook/mbart-large-50
source_max_length: 128
target_max_length: 128

# Data paths (adjust to your setup)
train_src: data/parallel/guarani/train.es
train_tgt: data/parallel/guarani/train.gn
val_src: data/parallel/guarani/val.es
val_tgt: data/parallel/guarani/val.gn

# Data filtering
length_ratio_threshold: 2.5
lowercase: true
remove_special_chars: true
normalize_unicode: true

# Training hyperparameters (tuned for L4 GPU 24GB)
learning_rate: 3.0e-5
weight_decay: 0.01
warmup_steps: 400        # Reduced from 800 for smaller datasets
num_train_epochs: 15
train_batch_size: 4       # Reduced from 8 for L4 memory
eval_batch_size: 8
gradient_accumulation_steps: 8  # Effective batch = 4*8 = 32
eval_steps: 200
save_steps: 200
logging_steps: 50
save_total_limit: 3
label_smoothing_factor: 0.1
lr_scheduler_type: cosine
early_stopping_patience: 5
fp16: true
bf16: false
seed: 42

# Generation
metric_for_best_model: chrfpp
generation_max_length: 128
generation_num_beams: 4

# Notes:
# - paper (arxiv 2601.03135) showed chrF++ improvements from synthetic
#   data augmentation for Guaraní-Spanish. Use the same augmentation pipeline.
# - Label smoothing reduced from 0.2 (original) to 0.1 — 0.2 is aggressive
#   and can hurt on small datasets.
# - Effective batch size of 32 matches the original (8 * 4 accum) but
#   uses less GPU memory per step.